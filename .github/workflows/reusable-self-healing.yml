name: "Reusable Self-Healing Pipeline"

on:
  workflow_call:
    inputs:
      scan_scope:
        description: "Scan scope (full, changed, quick)"
        required: false
        type: string
        default: "quick"
      auto_fix:
        description: "Enable auto-fix (creates PR)"
        required: false
        type: boolean
        default: false
      working_directory:
        description: "Working directory"
        required: false
        type: string
        default: "."

jobs:
  scan:
    name: "Self-Healing Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Governance file check
        run: |
          echo "=== Self-Healing Governance Scan ==="
          ISSUES=0

          # Check governance files
          for f in URN METADATA.yaml SECURITY.md; do
            if [ ! -f "$f" ]; then
              echo "::warning::Missing: $f"
              ISSUES=$((ISSUES+1))
            fi
          done

          if [ ! -d ".governance" ]; then
            echo "::warning::Missing: .governance/"
            ISSUES=$((ISSUES+1))
          fi

          # Check workflow health
          if [ -d ".github/workflows" ]; then
            WF_COUNT=$(ls .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null | wc -l)
            echo "Workflows found: $WF_COUNT"
          fi

          # Check CODEOWNERS
          if [ ! -f ".github/CODEOWNERS" ]; then
            echo "::warning::Missing: .github/CODEOWNERS"
            ISSUES=$((ISSUES+1))
          fi

          echo ""
          echo "Self-healing scan complete: $ISSUES issues found"
          # Always succeed — self-healing is advisory
          exit 0

  auto-fix:
    name: "Auto Fix"
    runs-on: ubuntu-latest
    needs: scan
    if: inputs.auto_fix
    steps:
      - uses: actions/checkout@v4

      - name: Apply auto-fixes
        run: |
          echo "Auto-fix mode enabled"
          FIXED=0

          # Fix: ensure .gitkeep in empty required dirs
          for dir in .governance .agent_hooks; do
            if [ ! -d "$dir" ]; then
              mkdir -p "$dir"
              touch "$dir/.gitkeep"
              FIXED=$((FIXED+1))
            fi
          done

          echo "Auto-fix complete: $FIXED fixes applied"
