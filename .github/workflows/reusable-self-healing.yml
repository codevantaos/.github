name: "Reusable Self-Healing"

on:
  workflow_call:
    inputs:
      severity_threshold:
        description: "Minimum severity to trigger healing"
        required: false
        type: string
        default: "CRITICAL,HIGH"
      auto_fix:
        description: "Enable automatic fix attempts"
        required: false
        type: boolean
        default: false
      scan_path:
        description: "Path to scan"
        required: false
        type: string
        default: "."

jobs:
  scan-and-heal:
    name: "Scan & Self-Heal"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: URN Governance Check
        run: |
          if [ -f "URN" ] && [ -f "METADATA.yaml" ]; then
            EXPECTED=$(cat URN | tr -d '[:space:]')
            ACTUAL=$(grep '^urn:' METADATA.yaml | awk '{print $2}' | tr -d '[:space:]' || echo "")
            if [ -n "$ACTUAL" ] && [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "ã URN Mismatch: expected=$EXPECTED actual=$ACTUAL"
              exit 1
            fi
            echo "ã URN validated: $EXPECTED"
          else
            echo "ã ÿ¡ URN or METADATA.yaml not found, skipping URN check"
          fi

      - name: Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: ${{ inputs.scan_path }}
          format: "table"
          exit-code: "1"
          severity: ${{ inputs.severity_threshold }}
        continue-on-error: true
        id: scan

      - name: Auto-Fix (if enabled)
        if: steps.scan.outcome == 'failure' && inputs.auto_fix
        run: |
          echo "=== Self-Healing Initiated ==="
          # Run local repair hook if exists
          if [ -f ".agent_hooks/repair/auto-repair.sh" ]; then
            bash .agent_hooks/repair/auto-repair.sh
          else
            echo "No local repair hook found"
          fi

          # Attempt dependency updates
          if [ -f "package.json" ]; then
            npm audit fix --force 2>/dev/null || true
          fi
          if [ -f "requirements.txt" ]; then
            pip install --upgrade pip 2>/dev/null || true
          fi

          # Commit fixes if any
          git config --global user.name "governance-bot"
          git config --global user.email "governance@${{ github.repository_owner }}.io"
          git add -A
          git commit -m "fix: auto-remediate security vulnerabilities [self-healing]" || echo "No changes"
          git push || echo "Push skipped"
