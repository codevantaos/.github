name: "Reusable CI Pipeline"

on:
  workflow_call:
    inputs:
      governance_urn:
        description: "URN identifier for governance check"
        required: false
        type: string
        default: ""
      run_lint:
        description: "Enable linting step"
        required: false
        type: boolean
        default: true
      run_test:
        description: "Enable test step"
        required: false
        type: boolean
        default: true
      test_command:
        description: "Custom test command (overrides default)"
        required: false
        type: string
        default: ""
      working_directory:
        description: "Working directory for test execution"
        required: false
        type: string
        default: "."
      python_version:
        description: "Python version for test environment"
        required: false
        type: string
        default: "3.11"
      node_version:
        description: "Node.js version (empty = skip node setup)"
        required: false
        type: string
        default: ""

jobs:
  preflight:
    name: "Preflight Check"
    runs-on: ubuntu-latest
    outputs:
      has_urn: ${{ steps.check.outputs.has_urn }}
      has_metadata: ${{ steps.check.outputs.has_metadata }}
      has_governance: ${{ steps.check.outputs.has_governance }}
      has_tests: ${{ steps.check.outputs.has_tests }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — check governance files
        id: check
        run: |
          echo "has_urn=$(test -f URN && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_metadata=$(test -f METADATA.yaml && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_governance=$(test -d .governance && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_tests=$(test -d tests && echo true || echo false)" >> "$GITHUB_OUTPUT"

  governance:
    name: "Governance Validation"
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Validate governance contract
        run: |
          echo "=== Governance Validation ==="
          ERRORS=0

          # Check required files
          for f in URN METADATA.yaml SECURITY.md; do
            if [ ! -f "$f" ]; then
              echo "⚠️ Missing: $f"
            else
              echo "✅ Found: $f"
            fi
          done

          # Check governance directory
          if [ -d ".governance" ]; then
            for f in policy.yaml ownership.yaml compliance.yaml; do
              if [ ! -f ".governance/$f" ]; then
                echo "⚠️ Missing: .governance/$f"
              else
                echo "✅ Found: .governance/$f"
              fi
            done
          fi

          # URN consistency check
          if [ -f "URN" ] && [ -f "METADATA.yaml" ]; then
            URN_FILE=$(cat URN | tr -d '[:space:]')
            URN_META=$(grep '^urn:' METADATA.yaml | awk '{print $2}' | tr -d '[:space:]' || echo "")
            if [ -n "$URN_META" ] && [ "$URN_FILE" != "$URN_META" ]; then
              echo "❌ URN Mismatch: file=$URN_FILE metadata=$URN_META"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ URN consistent: $URN_FILE"
            fi
          fi

          # Agent hooks check (optional)
          if [ -d ".agent_hooks" ]; then
            echo "✅ .agent_hooks/ directory present"
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "❌ Governance validation failed with $ERRORS error(s)"
            exit 1
          fi
          echo "✅ Governance validation passed"

  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    needs: preflight
    if: inputs.run_lint
    steps:
      - uses: actions/checkout@v4

      - name: YAML Lint
        run: |
          if command -v yamllint &> /dev/null; then
            find . -maxdepth 3 \( -name '*.yml' -o -name '*.yaml' \) \
              -not -path './.git/*' -not -path './node_modules/*' | \
              head -30 | xargs yamllint -d relaxed 2>/dev/null || true
          else
            echo "yamllint not installed, skipping"
          fi

      - name: Markdown Lint
        run: |
          if [ -f ".markdownlint.json" ]; then
            echo "Markdown lint config found"
          fi
          echo "Lint complete"

  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: preflight
    if: inputs.run_test && needs.preflight.outputs.has_tests == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: inputs.python_version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Setup Node.js
        if: inputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -n "${{ inputs.test_command }}" ]; then
            ${{ inputs.test_command }}
          elif [ -f "package.json" ]; then
            npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true
            npm test 2>/dev/null || echo "No test script found"
          elif [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            pip install pytest pytest-cov 2>/dev/null || true
            python -m pytest tests/ --tb=short -q 2>/dev/null || echo "No tests found"
          else
            echo "No test framework detected, skipping"
          fi
