name: "Reusable CI Pipeline"

on:
  workflow_call:
    inputs:
      governance_urn:
        description: "URN identifier for governance check"
        required: false
        type: string
        default: ""
      run_lint:
        description: "Enable linting step"
        required: false
        type: boolean
        default: true
      run_test:
        description: "Enable test step"
        required: false
        type: boolean
        default: true
      test_command:
        description: "Custom test command (overrides default)"
        required: false
        type: string
        default: ""
      working_directory:
        description: "Working directory for test execution"
        required: false
        type: string
        default: "."
      python_version:
        description: "Python version for test environment"
        required: false
        type: string
        default: "3.11"
      node_version:
        description: "Node.js version (empty = skip node setup)"
        required: false
        type: string
        default: ""

jobs:
  preflight:
    name: "Preflight Check"
    runs-on: ubuntu-latest
    outputs:
      has_urn: ${{ steps.check.outputs.has_urn }}
      has_metadata: ${{ steps.check.outputs.has_metadata }}
      has_governance: ${{ steps.check.outputs.has_governance }}
      has_tests: ${{ steps.check.outputs.has_tests }}
      has_python: ${{ steps.check.outputs.has_python }}
      has_node: ${{ steps.check.outputs.has_node }}
      has_lint_config: ${{ steps.check.outputs.has_lint_config }}
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — detect project structure
        id: check
        run: |
          echo "has_urn=$(test -f URN && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_metadata=$(test -f METADATA.yaml && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_governance=$(test -d .governance && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_tests=$(find . -name 'test_*.py' -o -name '*_test.py' -o -name '*.test.js' -o -name '*.test.ts' -o -name 'tests' -type d | head -1 | grep -q . && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_python=$(test -f requirements.txt -o -f setup.py -o -f pyproject.toml -o -f Pipfile && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_node=$(test -f package.json && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_lint_config=$(test -f .eslintrc.js -o -f .eslintrc.json -o -f .flake8 -o -f .pylintrc -o -f pyproject.toml && echo true || echo false)" >> "$GITHUB_OUTPUT"

  governance:
    name: "Governance Validation"
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Validate governance contract
        run: |
          echo "=== Governance Validation ==="
          WARNINGS=0

          for f in URN METADATA.yaml SECURITY.md; do
            if [ ! -f "$f" ]; then
              echo "::warning::Missing governance file: $f"
              WARNINGS=$((WARNINGS+1))
            else
              echo "OK: $f"
            fi
          done

          if [ ! -d ".governance" ]; then
            echo "::warning::Missing .governance/ directory"
            WARNINGS=$((WARNINGS+1))
          else
            echo "OK: .governance/"
          fi

          echo "Governance validation: $WARNINGS warnings"
          # Non-strict: warnings only, never fail
          exit 0

  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    needs: preflight
    if: inputs.run_lint && needs.preflight.outputs.has_lint_config == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: needs.preflight.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Setup Node
        if: needs.preflight.outputs.has_node == 'true' && inputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Run lint
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -f "package.json" ] && grep -q '"lint"' package.json 2>/dev/null; then
            npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true
            npm run lint 2>/dev/null || echo "::warning::Lint completed with issues"
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            pip install flake8 2>/dev/null || true
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics 2>/dev/null || echo "::warning::Lint completed with issues"
          else
            echo "No lint configuration detected, skipping"
          fi

  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: preflight
    if: inputs.run_test && needs.preflight.outputs.has_tests == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        if: needs.preflight.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Setup Node
        if: needs.preflight.outputs.has_node == 'true' && inputs.node_version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -n "${{ inputs.test_command }}" ]; then
            ${{ inputs.test_command }}
          elif [ -f "package.json" ] && grep -q '"test"' package.json 2>/dev/null; then
            npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true
            npm test 2>/dev/null || echo "::warning::Tests completed with issues"
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            pip install -r requirements.txt 2>/dev/null || true
            pip install pytest 2>/dev/null || true
            python -m pytest --tb=short 2>/dev/null || echo "::warning::Tests completed with issues"
          else
            echo "No test framework detected, skipping"
          fi
