apiVersion: secrets.codevantaos.io/v1
kind: SecretContract
description: Centralized secret registry — maps all secret references across the organization
secrets:
  API_URL:
    category: app
    scope: env
    required: false
    description: Application API URL
    provider: env-var
    used_in_repos:
    - infra-base
    reference_count: 1
  ARGOCD_SERVER:
    category: deploy
    scope: env
    required: false
    description: ArgoCD server URL
    provider: env-var
    used_in_repos:
    - infra-base
    reference_count: 1
  ARGOCD_TOKEN:
    category: deploy
    scope: env
    required: false
    description: ArgoCD API token
    provider: env-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  AUTO_FIX_TOKEN:
    category: github
    scope: org
    required: false
    description: Token for auto-fix PRs
    provider: org-secret
    used_in_repos:
    - core-kernel
    - infra-base
    reference_count: 2
  CLOUDFLARE_ACCOUNT_ID:
    category: cdn
    scope: org
    required: false
    description: Cloudflare account ID
    provider: org-secret
    used_in_repos:
    - core-main
    reference_count: 2
  CLOUDFLARE_API_TOKEN:
    category: cdn
    scope: org
    required: false
    description: Cloudflare API token
    provider: org-secret
    used_in_repos:
    - core-main
    reference_count: 3
  CODACY_PROJECT_TOKEN:
    category: quality
    scope: repo
    required: false
    description: Codacy project token
    provider: repo-secret
    used_in_repos:
    - infra-base
    reference_count: 3
  COSIGN_PRIVATE_KEY:
    category: security
    scope: org
    required: false
    description: Cosign signing key for container images
    provider: org-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  GCP_PROJECT_ID:
    category: cloud
    scope: org
    required: false
    description: GCP project ID
    provider: org-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  GCP_SA_KEY:
    category: cloud
    scope: org
    required: false
    description: GCP service account key (DEPRECATED — use OIDC)
    provider: org-secret
    deprecated: true
    used_in_repos:
    - infra-base
    reference_count: 3
  GCP_SERVICE_ACCOUNT:
    category: cloud
    scope: org
    required: false
    description: GCP service account email
    provider: org-secret
    used_in_repos:
    - infra-base
    reference_count: 2
  GCP_WORKLOAD_IDENTITY_PROVIDER:
    category: cloud
    scope: org
    required: false
    description: GCP Workload Identity Federation provider
    provider: org-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  GH_TOKEN:
    category: github
    scope: org
    required: true
    description: GitHub PAT for cross-repo operations
    provider: org-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  GITHUB_TOKEN:
    category: github
    scope: auto
    required: false
    description: Auto-provided by GitHub Actions
    provider: github
    used_in_repos:
    - core-kernel
    - core-main
    - infra-base
    reference_count: 9
  GKE_CLUSTER_NAME:
    category: cloud
    scope: env
    required: false
    description: GKE cluster name
    provider: env-var
    used_in_repos:
    - infra-base
    reference_count: 1
  GKE_REGION:
    category: cloud
    scope: env
    required: false
    description: GKE region
    provider: env-var
    used_in_repos:
    - infra-base
    reference_count: 1
  GL_TOKEN:
    category: github
    scope: org
    required: false
    description: GitLab token (legacy)
    provider: org-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  ORG_ADMIN_TOKEN:
    category: github
    scope: org
    required: false
    description: Org admin PAT for repo management
    provider: org-secret
    used_in_repos:
    - app-vercel
    - mod-platform
    - ops-observability
    reference_count: 6
  ORG_RUNNER_MANAGER_PAT:
    category: github
    scope: org
    required: false
    description: PAT for self-hosted runner management
    provider: org-secret
    used_in_repos:
    - app-vercel
    - core-kernel
    - mod-platform
    - ops-observability
    reference_count: 5
  PAT_EXPIRY_DATE:
    category: github
    scope: repo
    required: false
    description: PAT expiry date for monitoring
    provider: repo-var
    used_in_repos:
    - infra-base
    reference_count: 1
  PAT_TOKEN:
    category: github
    scope: org
    required: true
    description: Personal Access Token
    provider: org-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  PAT_TOKEN_ID:
    category: github
    scope: repo
    required: false
    description: PAT identifier for rotation tracking
    provider: repo-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  SLACK_WEBHOOK:
    category: notification
    scope: org
    required: false
    description: Slack webhook URL for notifications
    provider: org-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  SONAR_TOKEN:
    category: quality
    scope: repo
    required: false
    description: SonarQube/SonarCloud token
    provider: repo-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  SUPABASE_KEY:
    category: backend
    scope: env
    required: false
    description: Supabase API key
    provider: env-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  SUPABASE_URL:
    category: backend
    scope: env
    required: false
    description: Supabase project URL
    provider: env-secret
    used_in_repos:
    - infra-base
    reference_count: 1
  admin_token:
    category: github
    scope: org
    required: false
    description: Admin token (legacy naming)
    provider: org-secret
    rename_to: ORG_ADMIN_TOKEN
    used_in_repos:
    - .github
    reference_count: 4
  dispatch_token:
    category: github
    scope: org
    required: false
    description: Dispatch token for workflow triggers
    provider: org-secret
    used_in_repos:
    - .github
    reference_count: 2
