name: "Reusable Security Scan"

on:
  workflow_call:
    inputs:
      run_trivy:
        description: "Enable Trivy scan"
        required: false
        type: boolean
        default: true
      run_codeql:
        description: "Enable CodeQL analysis"
        required: false
        type: boolean
        default: false
      run_secret_scan:
        description: "Enable secret detection"
        required: false
        type: boolean
        default: true
      trivy_severity:
        description: "Trivy severity filter"
        required: false
        type: string
        default: "CRITICAL,HIGH"
      codeql_languages:
        description: "CodeQL languages"
        required: false
        type: string
        default: "javascript,python"

jobs:
  trivy:
    name: "Trivy Security Scan"
    runs-on: ubuntu-latest
    if: inputs.run_trivy
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: ${{ inputs.trivy_severity }}
          exit-code: '0'
          format: 'table'
        continue-on-error: true

  secret-scan:
    name: "Secret Detection"
    runs-on: ubuntu-latest
    if: inputs.run_secret_scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          echo "=== Secret Detection ==="
          # Basic pattern scan
          FOUND=0
          for pattern in "AKIA[0-9A-Z]{16}" "ghp_[a-zA-Z0-9]{36}" "sk-[a-zA-Z0-9]{48}"; do
            MATCHES=$(grep -rn "$pattern" --include="*.py" --include="*.js" --include="*.ts" --include="*.yml" --include="*.yaml" --include="*.json" --include="*.env" . 2>/dev/null | grep -v node_modules | grep -v .git | head -5)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Potential secret pattern found: $pattern"
              FOUND=$((FOUND+1))
            fi
          done
          echo "Secret scan complete: $FOUND patterns detected"
          exit 0
