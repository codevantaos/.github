name: "Reusable Dependabot Rescuer"

on:
  workflow_call:
    inputs:
      auto_approve:
        description: "Auto-approve Dependabot PRs"
        required: false
        type: boolean
        default: true
      auto_merge:
        description: "Auto-merge after approval"
        required: false
        type: boolean
        default: false

jobs:
  rescue:
    name: "Dependabot Rescue"
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Check Dependabot PR
        id: check
        run: |
          echo "=== Dependabot Rescuer ==="
          echo "Actor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"

          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "is_dependabot=true" >> "$GITHUB_OUTPUT"
            echo "Dependabot PR detected"
          else
            echo "is_dependabot=false" >> "$GITHUB_OUTPUT"
            echo "Not a Dependabot PR, skipping"
          fi

      - name: Auto-approve
        if: steps.check.outputs.is_dependabot == 'true' && inputs.auto_approve
        run: |
          echo "Auto-approve would be applied here"
          echo "::notice::Dependabot PR detected — auto-approve enabled"
          # Actual approval requires GH_PAT with PR write permissions
          # gh pr review --approve "${{ github.event.pull_request.number }}" || true
