name: "Reusable Governance Check"

on:
  workflow_call:
    inputs:
      strict:
        description: "Strict mode (fail on missing files)"
        required: false
        type: boolean
        default: false
      check_urn:
        description: "Check URN file"
        required: false
        type: boolean
        default: true
      check_governance_dir:
        description: "Check .governance/ directory"
        required: false
        type: boolean
        default: true
      check_metadata:
        description: "Check METADATA.yaml"
        required: false
        type: boolean
        default: true
      check_security:
        description: "Check SECURITY.md"
        required: false
        type: boolean
        default: true

jobs:
  governance-validation:
    name: "Governance Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate governance contract
        run: |
          echo "=== Governance Contract Validation ==="
          ERRORS=0
          WARNINGS=0

          if [ "${{ inputs.check_urn }}" = "true" ]; then
            if [ -f "URN" ]; then
              echo "OK: URN exists ($(cat URN))"
            else
              echo "::warning::Missing: URN"
              WARNINGS=$((WARNINGS+1))
            fi
          fi

          if [ "${{ inputs.check_metadata }}" = "true" ]; then
            if [ -f "METADATA.yaml" ]; then
              echo "OK: METADATA.yaml exists"
            else
              echo "::warning::Missing: METADATA.yaml"
              WARNINGS=$((WARNINGS+1))
            fi
          fi

          if [ "${{ inputs.check_security }}" = "true" ]; then
            if [ -f "SECURITY.md" ]; then
              echo "OK: SECURITY.md exists"
            else
              echo "::warning::Missing: SECURITY.md"
              WARNINGS=$((WARNINGS+1))
            fi
          fi

          if [ "${{ inputs.check_governance_dir }}" = "true" ]; then
            if [ -d ".governance" ]; then
              echo "OK: .governance/ exists"
              for f in policy.yaml ownership.yaml compliance.yaml; do
                if [ -f ".governance/$f" ]; then
                  echo "  OK: .governance/$f"
                else
                  echo "  ::warning::Missing: .governance/$f"
                  WARNINGS=$((WARNINGS+1))
                fi
              done
            else
              echo "::warning::Missing: .governance/ directory"
              WARNINGS=$((WARNINGS+1))
            fi
          fi

          # Check CODEOWNERS
          if [ -f ".github/CODEOWNERS" ]; then
            echo "OK: .github/CODEOWNERS exists"
          else
            echo "::warning::Missing: .github/CODEOWNERS"
            WARNINGS=$((WARNINGS+1))
          fi

          echo ""
          echo "=== Summary: $ERRORS errors, $WARNINGS warnings ==="

          if [ "${{ inputs.strict }}" = "true" ] && [ $WARNINGS -gt 0 ]; then
            echo "::error::Strict mode: $WARNINGS governance warnings treated as errors"
            exit 1
          fi

          exit 0
